<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Zone Tracker">
<title>Zone Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#f0ede8;--text2:#888;--text3:#555;
  --teal:#1D9E75;--amber:#BA7517;--coral:#D85A30;
  --purple:#7F77DD;--red:#E24B4A;--gray:#888780;--blue:#378ADD;
  --r:10px;--r-sm:6px;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;-webkit-tap-highlight-color:transparent;}
.app{max-width:480px;margin:0 auto;padding:16px;padding-top:env(safe-area-inset-top,16px)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.header-left h1{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.header-left p{font-size:11px;color:var(--text2);margin-top:2px;font-family:'JetBrains Mono',monospace}
.reset-btn{font-size:10px;color:var(--text3);background:transparent;border:0.5px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s}
.reset-btn:hover{color:var(--text2);border-color:var(--border2)}
.notif-bar{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.notif-bar p{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;flex:1}
.notif-btn{font-size:10px;font-family:'Syne',sans-serif;background:var(--teal);color:#fff;border:none;border-radius:var(--r-sm);padding:5px 12px;cursor:pointer;white-space:nowrap}
.date-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.date-bar-left{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text2)}
.week-badge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);background:var(--surface2);border:0.5px solid var(--border);border-radius:4px;padding:3px 8px}
.zones{display:flex;flex-direction:column;gap:8px}
.zone-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color 0.2s}
.zone-card.active{border-color:var(--zone-color)}
.zone-card.cleared{opacity:0.5}
.zone-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.zone-dot{width:8px;height:8px;border-radius:50%;background:var(--zone-color);flex-shrink:0}
.zone-name{font-size:13px;font-weight:700;flex:1;letter-spacing:-0.2px}
.zone-status{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2)}
.zone-play{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.zone-play:hover{background:var(--surface3)}
.zone-play.active-btn{background:var(--zone-color);border-color:var(--zone-color)}
.play-icon{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid var(--text);margin-left:2px}
.zone-play.active-btn .play-icon{display:none}
.pause-icon{display:none;width:8px;height:8px;position:relative}
.pause-icon::before,.pause-icon::after{content:'';position:absolute;width:2.5px;height:8px;background:#000;border-radius:1px;top:0}
.pause-icon::before{left:0}
.pause-icon::after{right:0}
.zone-play.active-btn .pause-icon{display:block}
.zone-bars{padding:0 14px 12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:34px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:var(--zone-color);transition:width 0.5s ease;max-width:100%}
.bar-time{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text2);width:38px;text-align:right;flex-shrink:0}
.cleared-badge{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--zone-color);padding:2px 8px;background:transparent;border:0.5px solid var(--zone-color);border-radius:3px;margin:0 14px 12px;display:inline-block}
.active-indicator{height:2px;background:var(--zone-color);animation:pulse-bar 1.5s ease-in-out infinite}
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:0.4}}
.bottom-bar{margin-top:16px;padding:12px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);display:flex;justify-content:space-between;align-items:center}
.bottom-stat{text-align:center}
.bottom-stat-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.bottom-stat-val{font-size:14px;font-weight:800}
.bottom-stat-val.warn{color:var(--amber)}
.bottom-stat-val.good{color:var(--teal)}
.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r-sm);padding:8px 16px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>Zone Tracker</h1>
      <p id="live-clock">--:-- --</p>
    </div>
    <button class="reset-btn" onclick="confirmReset()">Reset day</button>
  </div>

  <div class="notif-bar" id="notif-bar">
    <p id="notif-status">Enable notifications for zone alarms</p>
    <button class="notif-btn" id="notif-btn" onclick="requestNotifPermission()">Enable</button>
  </div>

  <div class="date-bar">
    <span class="date-bar-left" id="today-label">Monday</span>
    <span class="week-badge" id="week-label">Week 1</span>
  </div>
  <div class="zones" id="zones-container"></div>
  <div class="bottom-bar">
    <div class="bottom-stat">
      <div class="bottom-stat-label">daily logged</div>
      <div class="bottom-stat-val" id="stat-daily">0h 0m</div>
    </div>
    <div class="bottom-stat">
      <div class="bottom-stat-label">zones cleared</div>
      <div class="bottom-stat-val good" id="stat-cleared">0 / 7</div>
    </div>
    <div class="bottom-stat">
      <div class="bottom-stat-label">weekly buffer</div>
      <div class="bottom-stat-val warn" id="stat-buffer">21h 0m</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ZONES_DEF=[
  {id:'health',name:'Health / Gym',color:'#1D9E75',dailyMins:60,weeklyMins:360,dailyNote:'6 days — skip on rest day',isBlock:false},
  {id:'kirmedia',name:'Kirmedia',color:'#BA7517',dailyMins:86,weeklyMins:600,dailyNote:'Agency work',isBlock:false},
  {id:'rjm',name:'RJM Production',color:'#D85A30',dailyMins:86,weeklyMins:600,dailyNote:'Grip / intern',isBlock:false},
  {id:'education',name:'Education',color:'#7F77DD',dailyMins:86,weeklyMins:600,dailyNote:'Classes + self-study',isBlock:false},
  {id:'reserve',name:'Reserve Work',color:'#E24B4A',dailyMins:0,weeklyMins:480,dailyNote:'Weekly block — log when it happens',isBlock:true},
  {id:'recovery',name:'Recovery / Personal',color:'#888780',dailyMins:342,weeklyMins:2400,dailyNote:'Rest, meals, life',isBlock:false},
  {id:'sleep',name:'Sleep',color:'#378ADD',dailyMins:540,weeklyMins:3780,dailyNote:'9 hrs/night',isBlock:false},
];
const TOTAL_WEEKLY_MINS=ZONES_DEF.reduce((a,z)=>a+z.weeklyMins,0);

let notifGranted=false;
function updateNotifBar(){
  const bar=document.getElementById('notif-bar');
  const status=document.getElementById('notif-status');
  const btn=document.getElementById('notif-btn');
  if(!('Notification' in window)){
    status.textContent='Notifications not supported on this browser';
    btn.style.display='none';return;
  }
  if(Notification.permission==='granted'){
    notifGranted=true;
    status.textContent='Notifications on — zone alarms active';
    btn.textContent='On';btn.style.background='#444';btn.style.cursor='default';
    return;
  }
  if(Notification.permission==='denied'){
    status.textContent='Notifications blocked — enable in iOS Settings';
    btn.style.display='none';return;
  }
  status.textContent='Enable notifications for zone alarms';
  btn.textContent='Enable';
}
async function requestNotifPermission(){
  if(!('Notification' in window))return;
  const result=await Notification.requestPermission();
  if(result==='granted'){notifGranted=true;}
  updateNotifBar();
}
function scheduleNotif(zoneName,secsFromNow){
  if(!notifGranted)return;
  const key='notif_timeout_'+zoneName;
  if(window[key])clearTimeout(window[key]);
  if(secsFromNow<=0){fireNotif(zoneName);return;}
  window[key]=setTimeout(()=>fireNotif(zoneName),secsFromNow*1000);
}
function cancelNotif(zoneName){
  const key='notif_timeout_'+zoneName;
  if(window[key]){clearTimeout(window[key]);window[key]=null;}
}
function fireNotif(zoneName){
  if(!notifGranted)return;
  new Notification('Zone complete: '+zoneName,{
    body:'Daily target hit — switch zones or log it.',
    tag:zoneName,
    renotify:true,
    requireInteraction:true,
  });
}

function getKey(s){return 'zt_v3_'+s;}
function now(){return Date.now();}
function todayStr(){return new Date().toISOString().slice(0,10);}
function weekStr(){const d=new Date(),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return mon.toISOString().slice(0,10);}
function loadState(){try{return JSON.parse(localStorage.getItem(getKey('state'))||'null');}catch(e){return null;}}
function saveState(s){localStorage.setItem(getKey('state'),JSON.stringify(s));}
function freshDayData(){const d={};ZONES_DEF.forEach(z=>{d[z.id]={loggedMins:0,running:false,startedAt:null};});return d;}
function freshWeekData(){const d={};ZONES_DEF.forEach(z=>{d[z.id]={loggedMins:0};});return d;}
function initState(){
  const td=todayStr(),wk=weekStr();
  let s=loadState();
  if(!s){s={today:td,week:wk,day:freshDayData(),weekData:freshWeekData()};saveState(s);return s;}
  if(s.week!==wk){s.week=wk;s.weekData=freshWeekData();}
  if(s.today!==td){
    ZONES_DEF.forEach(z=>{
      const dd=s.day[z.id];
      if(dd&&dd.running&&dd.startedAt){const el=Math.floor((now()-dd.startedAt)/60000);dd.loggedMins+=el;dd.running=false;dd.startedAt=null;}
      if(dd)s.weekData[z.id].loggedMins+=dd.loggedMins;
    });
    s.today=td;s.day=freshDayData();
  }
  saveState(s);return s;
}
let STATE=initState();
function getLiveMins(zid){const dd=STATE.day[zid];if(!dd)return 0;let m=dd.loggedMins;if(dd.running&&dd.startedAt)m+=Math.floor((now()-dd.startedAt)/60000);return m;}
function getWeekMins(zid){return(STATE.weekData[zid]?.loggedMins||0)+getLiveMins(zid);}
function fmtMins(m){const h=Math.floor(Math.abs(m)/60),mn=Math.abs(m)%60;return(m<0?'-':'')+h+'h '+mn+'m';}
function fmtShort(m){const h=Math.floor(m/60),mn=m%60;return h>0?(h+'h '+(mn>0?mn+'m':'')):(mn+'m');}
function pct(val,max){return max>0?Math.min(100,Math.round(val/max*100)):0;}
function toggleZone(zid){
  const z=ZONES_DEF.find(x=>x.id===zid);
  const dd=STATE.day[zid];
  if(!dd)return;
  if(z.isBlock){showToast('Reserve: tap + to log hours directly');return;}
  const weekMins=getWeekMins(zid);
  if(weekMins>=z.weeklyMins&&!dd.running){showToast(z.name+' weekly target cleared!');return;}
  if(dd.running){
    const el=Math.floor((now()-dd.startedAt)/60000);
    dd.loggedMins+=el;dd.running=false;dd.startedAt=null;
    cancelNotif(z.name);
    showToast(z.name+' paused — +'+el+'m logged');
  } else {
    ZONES_DEF.forEach(oz=>{
      const od=STATE.day[oz.id];
      if(od&&od.running&&od.startedAt){
        const el=Math.floor((now()-od.startedAt)/60000);
        od.loggedMins+=el;od.running=false;od.startedAt=null;
        cancelNotif(ZONES_DEF.find(x=>x.id===oz.id)?.name||oz.id);
      }
    });
    dd.running=true;dd.startedAt=now();
    const remainMins=Math.max(0,z.dailyMins-dd.loggedMins);
    if(remainMins>0)scheduleNotif(z.name,remainMins*60);
    showToast(z.name+' started'+(remainMins>0?' — alarm in '+fmtShort(remainMins):''));
  }
  saveState(STATE);render();
}
function logReserve(){
  const mins=prompt('Log Reserve hours:\nEnter minutes (e.g. 480 for 8 hours):');
  if(!mins||isNaN(parseInt(mins)))return;
  const m=Math.max(0,parseInt(mins));
  STATE.day['reserve'].loggedMins+=m;
  saveState(STATE);render();
  showToast('Reserve: +'+fmtShort(m)+' logged');
}
function confirmReset(){
  if(confirm('Reset today\'s timers only?\nWeekly totals are NOT affected.')){
    ZONES_DEF.forEach(z=>{cancelNotif(z.name);STATE.day[z.id]={loggedMins:0,running:false,startedAt:null};});
    saveState(STATE);render();showToast('Day reset — weekly totals unchanged');
  }
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function render(){
  const container=document.getElementById('zones-container');
  if(!container)return;
  let totalDailyLogged=0,clearedCount=0,weeklyUsed=0;
  const html=ZONES_DEF.map(z=>{
    const liveMins=getLiveMins(z.id);
    const weekMins=getWeekMins(z.id);
    const dd=STATE.day[z.id];
    const isRunning=dd?.running||false;
    totalDailyLogged+=liveMins;weeklyUsed+=weekMins;
    const weekCleared=weekMins>=z.weeklyMins;
    if(weekCleared)clearedCount++;
    const dailyPct=z.isBlock?0:pct(liveMins,z.dailyMins);
    const weekPct=pct(weekMins,z.weeklyMins);
    const dailyRemain=z.isBlock?0:Math.max(0,z.dailyMins-liveMins);
    const weekRemain=Math.max(0,z.weeklyMins-weekMins);
    const cardClass=['zone-card',isRunning?'active':'',weekCleared?'cleared':''].filter(Boolean).join(' ');
    return `<div class="${cardClass}" style="--zone-color:${z.color}">
      ${isRunning?'<div class="active-indicator"></div>':''}
      <div class="zone-top" onclick="toggleZone('${z.id}')">
        <div class="zone-dot"></div>
        <div style="flex:1">
          <div class="zone-name">${z.name}</div>
          <div style="font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:1px">${z.dailyNote}</div>
        </div>
        <div class="zone-status">${isRunning?'running…':weekCleared?'✓ cleared':''}</div>
        ${z.isBlock
          ?`<button class="zone-play" onclick="event.stopPropagation();logReserve()" style="font-size:18px;color:var(--text2);font-weight:400">+</button>`
          :`<button class="zone-play ${isRunning?'active-btn':''}" onclick="event.stopPropagation();toggleZone('${z.id}')">
              <div class="play-icon"></div><div class="pause-icon"></div>
            </button>`
        }
      </div>
      ${weekCleared
        ?`<div class="cleared-badge">weekly target cleared — ${fmtShort(weekMins)} logged</div>`
        :`<div class="zone-bars">
            ${!z.isBlock?`<div class="bar-row">
              <span class="bar-label">today</span>
              <div class="bar-track"><div class="bar-fill" style="width:${dailyPct}%"></div></div>
              <span class="bar-time">${dailyRemain>0?fmtShort(dailyRemain)+' left':'done'}</span>
            </div>`:''}
            <div class="bar-row">
              <span class="bar-label">week</span>
              <div class="bar-track"><div class="bar-fill" style="width:${weekPct}%"></div></div>
              <span class="bar-time">${weekRemain>0?fmtShort(weekRemain)+' left':'done'}</span>
            </div>
          </div>`
      }
    </div>`;
  }).join('');
  container.innerHTML=html;
  document.getElementById('stat-daily').textContent=fmtMins(totalDailyLogged);
  document.getElementById('stat-cleared').textContent=clearedCount+' / '+ZONES_DEF.length;
  const bufferMins=TOTAL_WEEKLY_MINS-weeklyUsed;
  document.getElementById('stat-buffer').textContent=fmtMins(bufferMins);
  document.getElementById('stat-buffer').className='bottom-stat-val '+(bufferMins<120?'warn':'good');
}
function updateClock(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes(),ampm=h>=12?'PM':'AM',hh=h%12||12;
  document.getElementById('live-clock').textContent=hh+':'+(m<10?'0':'')+m+' '+ampm;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('today-label').textContent=days[n.getDay()];
  const soy=new Date(n.getFullYear(),0,1),wk=Math.ceil(((n-soy)/86400000+soy.getDay()+1)/7);
  document.getElementById('week-label').textContent='Week '+wk;
}
updateNotifBar();
if(Notification.permission==='granted')notifGranted=true;
updateClock();render();
setInterval(()=>{render();updateClock();},30000);
setInterval(()=>{const td=todayStr();if(STATE.today!==td){STATE=initState();render();}},60000);
</script>
</body>
</html>
